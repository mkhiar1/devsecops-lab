name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  devsecops:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install Bandit
      run: pip install bandit

    - name: Run Bandit security analysis
      run: bandit -r api --severity-level high
